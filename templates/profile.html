<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

</head>

<body class="profile-body">

    <section class="profile-navbar">
        <nav>
            <a href="/">
                <img src="/static/images/test1.png">
            </a>

            <div class="nav-links">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/rules">Rules & Regulations</a></li>
                    <li><a href="/mybooks">My Books</a></li>
                    <li><a href="/profile">Profile</a></li>
                </ul>
            </div>
        </nav>
    </section>

    

    <div class="main-content">
        <div class="top-section">
            <div>
                <h1>My Profile</h1>
                <p>Manage your library account information</p>
            </div>
        </div>

        

        <div class="profile-card">
            <div class="profile-left">
                <img src="https://i.imgur.com/6VBx3io.png"
                     class="profile-image">
                <br>

                <button
                     type="button"
                     class="edit-btn"
                     id="editBtn">
                    Edit Profile
                </button>

            </div>

            <div class="profile-right">
                <form action="/update-profile" method="post">
                <div class="info-row">
                    <span>Username</span>
                    <input type="text"
                           name="username"
                           value="{{ username }}">
                </div>

                <div class="info-row">
                    <span>Email</span>
                    <input type="email"
                           name="email"
                           value="{{ email }}">
                </div>

                <div class="info-row">
                    <span>Member Since</span>
                    <strong>2026</strong>
                </div>

                <div class="info-row">
                    <span>Books Borrowed</span>
                    <strong>12</strong>
                </div>

                <div class="info-row">
                    <span>Favorite Genre</span>
                    <strong>Fantasy</strong>
                </div>

                <button type="submit"
                        class="edit-btn">
                    Save Changes
                </button>
                </form>
            </div>
        </div>

        <!-- STATS -->

        <div class="stats">
            <div class="stat-box">
                <h2>12</h2>
                <p>Borrowed Books</p>
            </div>

            <div class="stat-box">
                <h2>7</h2>
                <p>Returned Books</p>
            </div>

            <div class="stat-box">
                <h2>5</h2>
                <p>Overdue Books</p>
            </div>
        </div>

    </div>

</body>
</html>
