<!DOCTYPE html> 
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_project.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <a href="/admin/register" class="admin-btn">Admin</a>
    <div class="top-bar">
        <i class="bx bx-book"></i>
        <span>MMU EasyLibrary</span>
        <a href="/sign_in" class="top-btn">Login</a>
    </div>

    <div class ="top-buttons">
        

        {% if session.get('admin_id') %}
            <a href="/logout" class="top-btn">Logout</a>
        {% endif %}

    </div>
    <div class="wrapper">
        <form action="/sign_in" method="post">
            <h1>Register</h1>
            <p class="subtitle">Welcome! Please fill in below.</p>
            <div class="input-box">
                <input type="email" name="email" placeholder="Email"
                required>
            </div>


            <div class="input-box">
                <input type="password" name="password" placeholder="Password"
                required>
            </div>


            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <br></br>
            <button type="submit" class="btn">Register</button>

            <div class="register-link">
                <p>Already have an account? <a href="/sign_in">Login</a>
                </p>
            </div>
        </form>
    </div>
</body>
</html>
